<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Cyber Security Toolkit</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0c15 0%, #0f111a 100%);
        }
        .auth-card {
            background: #121520;
            border: 1px solid #1f2230;
            border-radius: 24px;
            padding: 40px;
            width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-logo-icon {
            font-size: 48px;
        }
        .auth-logo h1 {
            font-size: 28px;
            margin-top: 10px;
            background: linear-gradient(135deg, #00d4ff, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: #0a0c15;
            border: 1px solid #1f2230;
            border-radius: 12px;
            color: #e5e7eb;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .auth-input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139,92,246,0.3);
        }
        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
            font-size: 13px;
        }
        .auth-link a {
            color: #00d4ff;
            text-decoration: none;
        }
        .error-msg {
            background: rgba(255,68,68,0.1);
            border: 1px solid #ff4444;
            border-radius: 10px;
            padding: 10px;
            color: #ff8888;
            font-size: 12px;
            margin-bottom: 15px;
            text-align: center;
        }
        .success-msg {
            background: rgba(16,185,129,0.1);
            border: 1px solid #10b981;
            border-radius: 10px;
            padding: 10px;
            color: #10b981;
            font-size: 12px;
            margin-bottom: 15px;
            text-align: center;
        }
        .password-strength {
            font-size: 11px;
            margin-top: -12px;
            margin-bottom: 12px;
            padding-left: 5px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">🛡️</div>
                <h1>Create Account</h1>
                <p style="color: #6b7280; font-size: 12px;">Start using Cyber Security Toolkit</p>
            </div>

            <div id="errorMsg" class="error-msg" style="display: none;"></div>
            <div id="successMsg" class="success-msg" style="display: none;"></div>

            <input type="text" id="username" class="auth-input" placeholder="Username" autocomplete="off">
            <input type="email" id="email" class="auth-input" placeholder="Email">
            <input type="password" id="password" class="auth-input" placeholder="Password">
            <input type="password" id="confirmPassword" class="auth-input" placeholder="Confirm Password">
            <div id="passwordStrength" class="password-strength"></div>
            
            <button class="auth-btn" onclick="signup()">🚀 Sign Up</button>
            
            <div class="auth-link">
                Already have an account? <a href="/login">Login</a>
            </div>
        </div>
    </div>

    <script>
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthDiv = document.getElementById('passwordStrength');
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            if (password.length === 0) {
                strengthDiv.textContent = '';
            } else if (strength <= 2) {
                strengthDiv.textContent = '⚠️ Weak password';
                strengthDiv.style.color = '#ff6b6b';
            } else if (strength <= 4) {
                strengthDiv.textContent = '⚠️ Medium password';
                strengthDiv.style.color = '#f59e0b';
            } else {
                strengthDiv.textContent = '✅ Strong password';
                strengthDiv.style.color = '#10b981';
            }
        }
        
        document.getElementById('password').addEventListener('input', checkPasswordStrength);
        
        async function signup() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            if (!username || !email || !password) {
                errorMsg.textContent = 'Please fill all fields';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters';
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successMsg.textContent = 'Account created! Redirecting to dashboard...';
                    successMsg.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = data.redirect || '/dashboard';
                    }, 1500);
                } else {
                    errorMsg.textContent = data.error;
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
            }
        }
        
        document.getElementById('confirmPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') signup();
        });
    </script>
</body>
</html>
